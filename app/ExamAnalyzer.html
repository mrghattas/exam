        const ConicPieChart = ({ data, total, title }) => {
          if (total === 0) return null;
          let current = 0;
          const stops = data.map(item => {
            const pct = (item.value / total) * 100;
            if (pct === 0) return null;
            const stop = `${item.color} ${current}% ${current + pct}%`;
            current += pct;
            return stop;
          }).filter(Boolean).join(', ');

          return (
            <div className="flex flex-col items-center p-4 bg-white border border-slate-100 shadow-sm rounded-2xl print:break-inside-avoid print-compact">

              return newScores;

              const newNames = [...prev];
              if (val > prev.length) { for (let i = prev.length; i < val; i++) newNames.push(`س ${i + 1}`); } 
              else { newNames.splice(val); }
              return newNames;
            });
            setCurrentStudentScores(Array(val).fill(''));

            const newNames = [...questionNames];
            newNames[index] = value;
            setQuestionNames(newNames);
          };

          const handleThresholdChange = (key, value) => {
            const val = Math.max(0, Math.min(100, Number(value)));
            setThresholds(prev => ({ ...prev, [key]: val }));

          const validateExamInfo = () => {
            if (!examInfo.subject.trim() || !examInfo.semester.trim() || !examInfo.school.trim() || !examInfo.stage.trim()) {
              alert(t('alertMissingInfo'));
              return false;
            }
            return true;
          };

          const getAutoFileName = () => {
            const parts = [examInfo.subject, examInfo.stage, examInfo.semester, examInfo.school].filter(p => p && p.trim() !== '');
            return parts.length > 0 ? parts.join(' - ') : t('untitledProject');
          };

          const generateTemplate = () => {
            if (!validateExamInfo()) return;
            const headers = "اسم الطالب;" + questionNames.join(";");
            const maxScoresRow = "الدرجة القصوى;" + questionMaxScores.join(";");
            const dummy1 = "طالب 1;" + questionMaxScores.map(s => Math.max(0, s - 1)).join(";");
            const dummy2 = "طالب 2;" + questionMaxScores.map(s => Math.floor(s / 2)).join(";");
            
            const csvContent = "data:text/csv;charset=utf-8,\uFEFF" + headers + "\n" + maxScoresRow + "\n" + dummy1 + "\n" + dummy2;
            const encodedUri = encodeURI(csvContent);
            const link = document.createElement("a");
            link.setAttribute("href", encodedUri);
            link.setAttribute("download", `Template_${getAutoFileName()}.csv`);
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            setStep(2);
          };

          const exportCurrentData = () => {
            let csv = "اسم الطالب;" + questionNames.join(";") + "\n";
            csv += "الدرجة القصوى;" + questionMaxScores.join(";") + "\n";
            studentsData.forEach(s => {
                csv += s.name + ";" + s.scores.join(";") + "\n";
            });
            const encodedUri = "data:text/csv;charset=utf-8,\uFEFF" + encodeURIComponent(csv);
            const link = document.createElement("a");
            link.setAttribute("href", encodedUri);
            link.setAttribute("download", `Data_${getAutoFileName()}.csv`);
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
          };

          const handleFileUpload = (e) => {
            const file = e.target.files[0];
            if (!file) return;
            setFileName(file.name);
            const reader = new FileReader();
            reader.onload = (event) => {
              parseCSV(event.target.result);
            };
            reader.readAsText(file);
          };

          const parseCSV = (text) => {
            const lines = text.split(/\r?\n/).filter(line => line.trim() !== '');
            if (lines.length < 2) { alert(t('alertMissingData')); return; }
            
            const headers = lines[0].split(/[,;\t]/).map(col => col.trim());
            const maxScoresCols = lines[1].split(/[,;\t]/).map(col => col.trim());
            
            const validQuestionIndices = [];
            const validMaxScores = [];
            const validNames = [];

            for (let i = 0; i < maxScoresCols.length; i++) {
              const val = parseFloat(maxScoresCols[i]);
              if (!isNaN(val) && val > 0) { 
                  validQuestionIndices.push(i); 
                  validMaxScores.push(val); 
                  validNames.push(headers[i] || `س ${validQuestionIndices.length}`);
              }
            }

            if (validMaxScores.length === 0) { alert(t('alertNoMaxScores')); return; }
            
            setNumQuestions(validMaxScores.length);
            setQuestionMaxScores(validMaxScores);
            setQuestionNames(validNames);
            setCurrentStudentScores(Array(validMaxScores.length).fill(''));

            const data = [];
            for (let i = 2; i < lines.length; i++) {
              const cols = lines[i].split(/[,;\t]/).map(col => col.trim());
              const studentScores = [];
              let studentTotal = 0;
              let hasValidData = false;
              
              for (let j = 0; j < validQuestionIndices.length; j++) {
                const colIndex = validQuestionIndices[j];
                let score = 0;
                if (colIndex < cols.length) {
                  const parsedScore = parseFloat(cols[colIndex]);
                  if (!isNaN(parsedScore)) { score = parsedScore; hasValidData = true; }
                }
                studentScores.push(score);
                studentTotal += score;
              }
              
              if (hasValidData) { 
                  let sName = `طالب ${data.length + 1}`;
                  if (!validQuestionIndices.includes(0) && cols[0] && cols[0] !== '') {
                      sName = cols[0];
                  }
                  data.push({ name: sName, scores: studentScores, total: studentTotal }); 
              }
            }
            
            setStudentsData(data);
            setCustomInsights({}); 
            setStep(3); 
          };
          
          const saveProjectLocally = () => {
              const defaultName = getAutoFileName();
              const projectName = window.prompt(t('projectNamePrompt'), defaultName);
              if (!projectName) return;
              const newProject = {
                  id: Date.now(), name: projectName, date: new Date().toLocaleDateString(lang === 'ar' ? 'ar-EG' : 'en-US'),
                  data: { examInfo, numQuestions, questionMaxScores, questionNames, thresholds, studentsData, customInsights, fileName }
              };
              const updatedProjects = [newProject, ...savedProjects];
              localStorage.setItem('examAnalyzerProjects', JSON.stringify(updatedProjects));
              setSavedProjects(updatedProjects);
              alert(t('projectSaved'));
          };

          const loadProject = (project) => {
              const d = project.data;
              setExamInfo(d.examInfo); 
              setNumQuestions(d.numQuestions); 
              setQuestionMaxScores(d.questionMaxScores);

              setShowProjectsModal(false); 
              
              if (d.studentsData && d.studentsData.length > 0) {
                  setStep(4); 
              } else {
                  setStep(3); 
              }
          };

                  const updatedProjects = savedProjects.filter(p => p.id !== id);
                  localStorage.setItem('examAnalyzerProjects', JSON.stringify(updatedProjects));
                  setSavedProjects(updatedProjects);

          };

          const exportProjectsBackup = () => {

              const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(savedProjects));
              const link = document.createElement("a");

              link.setAttribute("download", `ExamAnalyzer_Backup_${Date.now()}.json`);
              document.body.appendChild(link);
              link.click();
              link.remove();
          };

          const importProjectsBackup = (e) => {
              const file = e.target.files[0];
              if (!file) return;
              const reader = new FileReader();
              reader.onload = (event) => {
                  try {
                      const imported = JSON.parse(event.target.result);
                      if (Array.isArray(imported)) {
                          const currentIds = savedProjects.map(p => p.id);
                          const newProjects = imported.filter(p => !currentIds.includes(p.id));
                          const combined = [...newProjects, ...savedProjects];
                          setSavedProjects(combined);
                          localStorage.setItem('examAnalyzerProjects', JSON.stringify(combined));
                          alert(t('importSuccess'));
                      } else { throw new Error("Invalid format"); }
                  } catch (error) { alert(t('importError')); }
                  e.target.value = null;
              };
              reader.readAsText(file);
          };

          const stats = useMemo(() => {
            if (studentsData.length === 0) return null;

            const maxTotalScore = questionMaxScores.reduce((a, b) => a + b, 0);
            const totals = studentsData.map(s => s.total);
            const totalStudents = studentsData.length;

            const sum = totals.reduce((a, b) => a + b, 0);
            const mean = sum / totalStudents;
            
            const sorted = [...totals].sort((a, b) => a - b);
            const median = totalStudents % 2 !== 0 ? sorted[Math.floor(totalStudents / 2)] : (sorted[totalStudents / 2 - 1] + sorted[totalStudents / 2]) / 2;

            const freq = {};
            totals.forEach(t => freq[t] = (freq[t] || 0) + 1);
            let maxFreq = 0, mode = totals[0];
            for (const key in freq) {
              if (freq[key] > maxFreq) { maxFreq = freq[key]; mode = Number(key); }
            }

            const variance = totals.reduce((a, b) => a + Math.pow(b - mean, 2), 0) / totalStudents;
            const stdDev = Math.sqrt(variance);

            const maxScore = sorted[totalStudents - 1];
            const minScore = sorted[0];
            const range = maxScore - minScore;

            let gradesCount = { excellent: 0, veryGood: 0, good: 0, acceptable: 0, fail: 0 };
            totals.forEach(t => {
              const percentage = (t / maxTotalScore) * 100;
              if (percentage >= thresholds.excellent) gradesCount.excellent++;
              else if (percentage >= thresholds.veryGood) gradesCount.veryGood++;
              else if (percentage >= thresholds.good) gradesCount.good++;
              else if (percentage >= thresholds.acceptable) gradesCount.acceptable++;
              else gradesCount.fail++;
            });

            const passCount = totalStudents - gradesCount.fail;
            const passPercent = (passCount / totalStudents) * 100;

            const fullMarksCount = totals.filter(t => t === maxTotalScore).length;
            const zeroMarksCount = totals.filter(t => t === 0).length;
            const aboveMeanCount = totals.filter(t => t >= mean).length;

            const questionStats = [];
            for (let i = 0; i < numQuestions; i++) {
              const maxQScore = questionMaxScores[i];
              const qScores = studentsData.map(s => s.scores[i]);
              const qSum = qScores.reduce((a, b) => a + b, 0);
              const qMean = qSum / totalStudents;
              const qVariance = qScores.reduce((a, b) => a + Math.pow(b - qMean, 2), 0) / totalStudents;
              const qStdDev = Math.sqrt(qVariance);
              
              const difficulty = maxQScore > 0 ? (qMean / maxQScore) : 0; 
              const qFullMarks = qScores.filter(s => s === maxQScore).length;
              const qZeros = qScores.filter(s => s === 0).length;
              const qPassCount = qScores.filter(s => (s / maxQScore) * 100 >= thresholds.acceptable).length; 

              let insight = "";
              if (difficulty > 0.8) insight = t('insightEasy');
              else if (difficulty < 0.3) insight = t('insightHard');
              else insight = t('insightMedium');

              if (qZeros > totalStudents * 0.3) insight += t('insightZeros');
              else if (qFullMarks === totalStudents) insight = t('insightFull');

              const normalizedStdDev = maxQScore > 0 ? (qStdDev / maxQScore) : 0;
              if (normalizedStdDev > 0.3) insight += t('insightHighStdDev');
              else if (normalizedStdDev < 0.15) insight += t('insightLowStdDev');
              else insight += t('insightNormalStdDev');

              questionStats.push({
                id: i + 1, 
                name: questionNames[i] || `س ${i+1}`, 
                maxScore: maxQScore, 
                mean: qMean, 
                stdDev: qStdDev, 
                normalizedStdDev: normalizedStdDev,
                difficulty: difficulty, 
                fullMarks: qFullMarks, 
                zeros: qZeros, 
                passCount: qPassCount,
                passPercent: (qPassCount / totalStudents) * 100, 
                fullMarksPercent: (qFullMarks / totalStudents) * 100,
                insight: insight
              });
            }

            return {
              totalStudents, maxTotalScore, mean, median, mode, stdDev, maxScore, minScore, range,
              gradesCount, passCount, passPercent, fullMarksCount, zeroMarksCount, aboveMeanCount, questionStats
            };

                          );
                        })}
                      </tbody>
                    </table>
                  </div>
                </div>

                <div className="print-page-break-before space-y-4 print:pt-4 print:mt-0 relative">
                  <h3 className="text-xl font-bold text-slate-800 mb-6 flex items-center gap-2"><BrainCircuit className="text-indigo-500" /> {t('smartAnalysis')}</h3>
                  {stats.questionStats.map((q) => (
                    <div key={q.id} className="print-avoid-break bg-white rounded-2xl border border-slate-200 overflow-hidden shadow-sm print:mb-4">
                      <div className="bg-slate-50 border-b border-slate-200 px-6 py-4 flex justify-between items-center print:px-4 print:py-2">
                        <h4 className="font-bold text-lg text-slate-800">{t('qReport')} {q.name} <span className="text-sm font-normal text-slate-500 mx-2">({t('outOf')} {q.maxScore} {t('degree')})</span></h4>
                        <span className="bg-white px-3 py-1 rounded-full text-sm font-semibold text-slate-600 shadow-sm border border-slate-100">
                          {t('diffIndex')}: {q.difficulty.toFixed(2)}
                        </span>
                      </div>
                      <div className="p-6 print:p-4">
                        <div className="grid grid-cols-2 sm:grid-cols-5 gap-4 mb-6 print:mb-3 print:gap-2">
                          <div className="text-center p-3 print:p-2 bg-slate-50 rounded-xl"><p className="text-xs text-slate-500 mb-1">{t('passedCount')}</p><p className="font-bold text-slate-800">{q.passCount}</p></div>
                          <div className="text-center p-3 print:p-2 bg-slate-50 rounded-xl"><p className="text-xs text-slate-500 mb-1">{t('fullMarksCount')}</p><p className="font-bold text-slate-800">{q.fullMarks}</p></div>
                          <div className="text-center p-3 print:p-2 bg-slate-50 rounded-xl"><p className="text-xs text-slate-500 mb-1">{t('zerosCount')}</p><p className="font-bold text-slate-800">{q.zeros}</p></div>
                          <div className="text-center p-3 print:p-2 bg-slate-50 rounded-xl"><p className="text-xs text-slate-500 mb-1">{t('qMean')}</p><p className="font-bold text-slate-800">{q.mean.toFixed(2)}</p></div>
                          <div className="text-center p-3 print:p-2 bg-slate-50 rounded-xl border border-indigo-100"><p className="text-xs text-indigo-500 mb-1 font-bold">SD</p><p className="font-bold text-indigo-900">{q.stdDev.toFixed(2)}</p></div>
                        </div>
                        
                        <div className="bg-indigo-50 border border-indigo-100 p-4 rounded-xl flex gap-3 items-start">
                          <Info className="text-indigo-500 flex-shrink-0 mt-0.5" size={20} />
                          <div className="w-full">
                            <div className="flex justify-between items-center mb-1">
                               <p className="text-sm font-bold text-indigo-800">{t('smartAnalysis')}:</p>
                               <span className="text-xs text-indigo-500 font-medium border border-indigo-200 bg-indigo-50 px-2 py-0.5 rounded-full print:hidden mr-2 cursor-pointer">
                                   <i className="fas fa-edit ml-1"></i>
                                   {t('editable')}
                               </span>
                            </div>
                            <textarea 
                              className="print:hidden w-full bg-transparent text-indigo-900 leading-relaxed text-sm outline-none resize-y min-h-[4rem] block"
                              value={customInsights[q.id] !== undefined ? customInsights[q.id] : q.insight}
                              onChange={(e) => setCustomInsights(prev => ({...prev, [q.id]: e.target.value}))}
                            />
                            <div className="hidden print:block text-indigo-900 leading-relaxed text-sm whitespace-pre-wrap text-justify">
                               {customInsights[q.id] !== undefined ? customInsights[q.id] : q.insight}
                            </div>
                          </div>
                        </div>
                      </div>
                    </div>
                  ))}
                </div>

              </div>
            );
          };

          return (
            <div className="min-h-screen flex flex-col relative pb-10">
              
              {/* نافذة المشاريع المحفوظة - تم إعادتها إلى هنا لكي تظهر عند الضغط */}
              {showProjectsModal && (
                  <div className="fixed inset-0 bg-slate-900/50 z-50 flex items-center justify-center p-4 print:hidden backdrop-blur-sm">
                      <div className="bg-white rounded-2xl shadow-xl w-full max-w-2xl max-h-[85vh] flex flex-col overflow-hidden">
                          <div className="p-5 border-b border-slate-100 flex justify-between items-center bg-slate-50">
                              <h3 className="text-xl font-bold text-slate-800 flex items-center gap-2">
                                  <FolderOpen className="text-indigo-600"/> {t('myProjects')}
                              </h3>
                              <button onClick={() => setShowProjectsModal(false)} className="text-slate-400 hover:text-red-500 transition">
                                  <i className="fas fa-times text-xl"></i>
                              </button>
                          </div>
                          
                          <div className="p-4 bg-indigo-50 border-b border-indigo-100 flex flex-wrap gap-3 justify-center">
                              <button 
                                onClick={exportProjectsBackup}
                                className="flex items-center gap-2 px-4 py-2 bg-white text-indigo-700 border border-indigo-200 font-bold rounded-lg hover:bg-indigo-600 hover:text-white hover:border-indigo-600 transition shadow-sm text-sm"
                                disabled={savedProjects.length === 0}
                              >
                                  <Download size={16} />
                                  {t('exportBtn')}
                              </button>
                              <button 
                                onClick={() => projectImportRef.current.click()}
                                className="flex items-center gap-2 px-4 py-2 bg-indigo-600 text-white font-bold rounded-lg hover:bg-indigo-700 transition shadow-sm text-sm"
                              >
                                  <FileArchive size={16} />
                                  {t('importProjectBtn')}
                              </button>
                              <input type="file" accept=".json" className="hidden" ref={projectImportRef} onChange={importProjectsBackup} />
                          </div>

                          <div className="p-5 overflow-y-auto flex-1">
                              {savedProjects.length === 0 ? (
                                  <div className="text-center py-10 text-slate-400">
                                      <FolderOpen size={48} className="mx-auto mb-3 opacity-20" />
                                      <p>{t('noProjects')}</p>
                                  </div>
                              ) : (
                                  <div className="space-y-3">
                                      {savedProjects.map(proj => (
                                          <div key={proj.id} className="flex flex-col sm:flex-row sm:items-center justify-between p-4 rounded-xl border border-slate-200 hover:border-indigo-300 hover:shadow-sm transition bg-white gap-4">
                                              <div>
                                                  <h4 className="font-bold text-slate-800 text-lg mb-1">{proj.name}</h4>
                                                  <div className="flex gap-3 text-xs text-slate-500">
                                                      <span><i className="far fa-calendar-alt"></i> {proj.date}</span>
                                                      <span><i className="fas fa-users"></i> {proj.data.studentsData.length} {t('student')}</span>
                                                  </div>
                                              </div>
                                              <div className="flex gap-2">
                                                  <button onClick={() => deleteProject(proj.id)} className="w-10 h-10 rounded-lg flex items-center justify-center text-red-400 border border-red-100 hover:bg-red-50 hover:text-red-600 transition" title={t('delete')}>
                                                      <Trash2 size={16}/>
                                                  </button>
                                                  <button onClick={() => loadProject(proj)} className="px-4 py-2 bg-indigo-600 text-white font-medium rounded-lg hover:bg-indigo-700 transition shadow-sm whitespace-nowrap text-sm flex-1">
                                                      {t('load')}
                                                  </button>
                                              </div>
                                          </div>
                                      ))}
                                  </div>
                              )}
                          </div>
                          <div className="p-4 border-t border-slate-100 bg-slate-50 text-end">
                              <button onClick={() => setShowProjectsModal(false)} className="px-6 py-2 bg-slate-200 text-slate-700 font-bold rounded-lg hover:bg-slate-300 transition">
                                  {t('close')}
                              </button>
                          </div>
                      </div>
                  </div>
              )}

              <header className="bg-white border-b border-slate-200 py-6 mb-8 print:hidden">
                <div className="max-w-6xl mx-auto px-4 flex flex-col md:flex-row items-center justify-between gap-4">
                  <div className="flex items-center gap-3">
                    <div className="bg-blue-600 p-2 rounded-lg">
                      <BarChart3 className="text-white" size={24} />
                    </div>
                    <h1 className="text-xl md:text-2xl font-black text-slate-800 tracking-tight">{t('appName')}</h1>
                  </div>
                  
                  <div className="flex items-center gap-6">
                    <div className="text-sm font-medium text-slate-500 bg-slate-100 px-3 py-1 rounded-full">
                      {t('step')} {step} {t('of')} 4
                    </div>
                    <button 
                        onClick={() => setLang(lang === 'ar' ? 'en' : 'ar')}
                        className="flex items-center gap-2 text-sm font-bold bg-slate-800 text-white px-4 py-1.5 rounded-full hover:bg-slate-700 transition shadow-sm"
                    >
                        <i className="fas fa-globe"></i>
                        {lang === 'ar' ? 'English' : 'عربي'}
                    </button>
                  </div>
                </div>
              </header>

              <main className="max-w-6xl mx-auto px-4 flex-grow w-full">
                {step === 1 && renderStep1()}
                {step === 2 && renderStep2()}
                {step === 3 && renderStep3()}
                {step === 4 && renderStep4()}
              </main>
            </div>
          );
        }

        function StatCard({ title, value, subtitle, icon, color, bg }) {
          return (
            <div className="bg-white p-5 print:p-3 rounded-2xl border border-slate-100 shadow-sm flex items-start justify-between h-full">
              <div>
                <p className="text-slate-500 text-sm font-medium mb-1">{title}</p>
                <p className="text-2xl print:text-xl font-bold text-slate-800">{value}</p>
                {subtitle && <p className="text-xs text-slate-400 mt-1">{subtitle}</p>}
              </div>
              <div className={`w-10 h-10 print:w-8 print:h-8 rounded-full flex items-center justify-center ${bg} ${color} flex-shrink-0`}>{icon}</div>
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<ExamAnalyzer />);
    </script>
</body>
</html>
