<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>محلل نتائج الطلاب | البوابة</title>
    
    <link rel="manifest" href="./manifest.json">
    <meta name="theme-color" content="#4f46e5">
    
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f8fafc;
            color: #333;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            text-align: center;
            padding: 20px;
        }
        .container {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            max-width: 500px;
            width: 100%;
        }
        h1 { color: #1e293b; font-size: 24px; margin-bottom: 10px; }
        p { color: #64748b; font-size: 16px; margin-bottom: 30px; line-height: 1.6; }
        .btn {
            display: inline-block;
            background-color: #4f46e5;
            color: white;
            padding: 15px 30px;
            border-radius: 12px;
            text-decoration: none;
            font-size: 18px;
            font-weight: bold;
            transition: all 0.3s ease;
            box-shadow: 0 4px 6px rgba(79, 70, 229, 0.2);
        }
        .btn:hover {
            background-color: #4338ca;
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(79, 70, 229, 0.3);
        }
        .install-hint {
            margin-top: 20px;
            font-size: 13px;
            color: #94a3b8;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>مرحباً بك في مُحلل نتائج الطلاب</h1>
        <p>التطبيق الاحترافي لتحليل نتائج الطلاب واستخراج تقارير الأداء بدقة وسرعة.</p>
        
        <a href="./app.html" class="btn">الدخول إلى التطبيق الآن</a>
        
        <div class="install-hint">
            💡 ملاحظة: يمكنك تثبيت هذا التطبيق على جهازك للعمل بدون إنترنت (ابحث عن علامة التثبيت في شريط العنوان بالأعلى).
        </div>
    </div>

    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./service-worker.js')
                .then(registration => {
                    console.log('تم التفعيل بنجاح واجهة الدخول:', registration.scope);
                })
                .catch(error => {
                    console.log('فشل التفعيل:', error);
                });
            });
        }
    </script>
</body>
</html>
