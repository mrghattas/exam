<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">

    <title>برمجيات الغطاس</title>
    
    <link rel="manifest" href="./manifest.json">
    <meta name="theme-color" content="#4f46e5">
    
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f8fafc;
            color: #333;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            text-align: center;
            padding: 20px;
        }
        .container {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            max-width: 500px;
            width: 100%;
        }
        h1 { color: #1e293b; font-size: 24px; margin-bottom: 10px; }
        p { color: #64748b; font-size: 16px; margin-bottom: 30px; line-height: 1.6; }
        .btn {
            display: inline-block;
            background-color: #4f46e5;
            color: white;
            padding: 15px 30px;
            border-radius: 12px;
            text-decoration: none;
            font-size: 18px;
            font-weight: bold;
            transition: all 0.3s ease;
            box-shadow: 0 4px 6px rgba(79, 70, 229, 0.2);
            margin-bottom: 15px; /* مسافة بين الأزرار */
            width: 100%;
            box-sizing: border-box;
        }
        .btn:hover {
            background-color: #4338ca;
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(79, 70, 229, 0.3);
        }
        
        /* تصميم زر التحديث الجديد */
        .btn-update {
            background-color: #ef4444; /* لون أحمر للتنبيه */
            box-shadow: 0 4px 6px rgba(239, 68, 68, 0.2);
        }
        .btn-update:hover {
            background-color: #dc2626;
            box-shadow: 0 6px 12px rgba(239, 68, 68, 0.3);
        }

        .install-hint {
            margin-top: 20px;
            font-size: 13px;
            color: #94a3b8;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>مرحباً بك في برمجيات الغطاس </h1>
        <br><br> <a href="./Analyzer.html" class="btn">دخول تطبيق تحليل نتائج الطلاب</a>
        

        <button id="forceUpdateBtn" class="btn btn-update">تحديث الموقع (مسح الذاكرة)</button>

    </div>

    <script>
        // 1. كود تشغيل الـ Service Worker العادي
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./service-worker.js')
                .then(registration => {
                    console.log('تم التفعيل بنجاح واجهة الدخول:', registration.scope);
                })
                .catch(error => {
                    console.log('فشل التفعيل:', error);
                });
            });
        }

        // 2. برمجة زر "تحديث الموقع" الجديد
        document.getElementById('forceUpdateBtn').addEventListener('click', function() {
            // تغيير نص الزر ليُعلم المستخدم أنه جاري التحديث
            this.innerText = "جاري التحديث...";
            this.style.opacity = "0.7";

            // أ) مسح وإلغاء تسجيل الـ Service Worker القديم
            if ('serviceWorker' in navigator) {
                navigator.serviceWorker.getRegistrations().then(function(registrations) {
                    for(let registration of registrations) {
                        registration.unregister();
                    }
                });
            }

            // ب) مسح الذاكرة المؤقتة (Cache) من المتصفح
            if ('caches' in window) {
                caches.keys().then(function(names) {
                    for (let name of names) {
                        caches.delete(name);
                    }
                });
            }

            // ج) إعادة تحميل الصفحة إجبارياً بعد نصف ثانية للتأكد من مسح كل شيء
            setTimeout(() => {
                window.location.reload(true);
            }, 500);
        });
    </script>
</body>
</html>
