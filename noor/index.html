<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>البوابة السريعة لمنصة عُمان التعليمية</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#f4f7f6">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="بوابة عُمان">
    <link rel="apple-touch-icon" href="https://upload.wikimedia.org/wikipedia/commons/4/44/Microsoft_logo.svg">

    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; margin: 0; padding: 0; text-align: center; -webkit-tap-highlight-color: transparent;}
        .container { max-width: 600px; margin: 20px auto; padding: 20px; background: white; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); transition: 0.3s; }
        
        h2 { color: #333; margin-bottom: 5px; }
        .subtitle { color: #666; font-size: 14px; margin-bottom: 25px; }

        .btn-link { display: block; margin: 15px auto; padding: 15px; border-radius: 10px; width: 90%; border: none; cursor: pointer; font-size: 16px; font-family: inherit; font-weight: bold; color: white; text-decoration: none; box-shadow: 0 4px 6px rgba(0,0,0,0.1); transition: 0.2s;}
        .btn-link:active { transform: scale(0.98); }
        
        /* ألوان الأزرار */
        .teacher-btn { background-color: #28a745; }
        .student-btn { background-color: #17a2b8; }
        .login-btn { background-color: #2F2F2F; border: 1px solid #ddd; margin-bottom: 30px;}
        .back-btn { background-color: #e9ecef; color: #333; width: auto; display: inline-block; padding: 8px 15px; font-size: 14px; margin-top: 0; margin-bottom: 20px;}

        /* إخفاء الأقسام في البداية */
        #dashboard-screen, #teacher-links, #student-links { display: none; }
    </style>
</head>
<body>

    <div class="container" id="welcome-screen">
        <img src="https://upload.wikimedia.org/wikipedia/commons/4/44/Microsoft_logo.svg" width="60" alt="Logo" style="margin-bottom: 10px;">
        <h2>البوابة التعليمية السريعة</h2>
        <p class="subtitle">الرجاء اختيار صفتك للمتابعة</p>

        <button class="btn-link teacher-btn" onclick="showDashboard('teacher')">👨‍🏫 دخول المعلمين</button>
        <button class="btn-link student-btn" onclick="showDashboard('student')">👨‍🎓 دخول الطلاب</button>
    </div>

    <div class="container" id="dashboard-screen">
        <button class="btn-link back-btn" onclick="goBack()">🔙 تغيير المستخدم</button>
        
        <h2 id="dashboard-title">لوحة التحكم</h2>
        <p class="subtitle">1. سجل دخولك أولاً | 2. اختر الخدمة المطلوبة</p>

        <button class="btn-link login-btn" onclick="openInApp('https://lms.moe.gov.om/')">
            🔑 تسجيل الدخول بالمنصة
        </button>

        <div id="teacher-links">
            <button class="btn-link teacher-btn" onclick="openInApp('https://lms.moe.gov.om/teachers/preparations')">التحضير الإلكتروني</button>
            <button class="btn-link teacher-btn" onclick="openInApp('https://lms.moe.gov.om/virtual_classrooms')">الفصول الافتراضية</button>
            <button class="btn-link teacher-btn" onclick="openInApp('https://lms.moe.gov.om/assignments')">إدارة الواجبات</button>
            <button class="btn-link teacher-btn" onclick="openInApp('https://lms.moe.gov.om/exams')">الاختبارات الإلكترونية</button>
        </div>

        <div id="student-links">
            <button class="btn-link student-btn" onclick="openInApp('https://lms.moe.gov.om/students/timetable')">الجدول الدراسي</button>
            <button class="btn-link student-btn" onclick="openInApp('https://lms.moe.gov.om/virtual_classrooms')">حضور الفصول الافتراضية</button>
            <button class="btn-link student-btn" onclick="openInApp('https://lms.moe.gov.om/students/assignments')">حل الواجبات</button>
            <button class="btn-link student-btn" onclick="openInApp('https://lms.moe.gov.om/students/exams')">أداء الاختبارات</button>
        </div>
    </div>

    <script>
        // دالة موحدة لفتح جميع الروابط داخل نفس التطبيق
        function openInApp(url) {
            window.location.href = url;
        }

        // دوال التنقل بين الشاشات
        function showDashboard(role) {
            document.getElementById('welcome-screen').style.display = 'none';
            document.getElementById('dashboard-screen').style.display = 'block';

            if (role === 'teacher') {
                document.getElementById('dashboard-title').innerText = '👨‍🏫 بوابة المعلم';
                document.getElementById('teacher-links').style.display = 'block';
                document.getElementById('student-links').style.display = 'none';
            } else if (role === 'student') {
                document.getElementById('dashboard-title').innerText = '👨‍🎓 بوابة الطالب';
                document.getElementById('teacher-links').style.display = 'none';
                document.getElementById('student-links').style.display = 'block';
            }
        }

        function goBack() {
            document.getElementById('dashboard-screen').style.display = 'none';
            document.getElementById('welcome-screen').style.display = 'block';
            document.getElementById('teacher-links').style.display = 'none';
            document.getElementById('student-links').style.display = 'none';
        }

        // كود Service Worker للتطبيق
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js');
            });
        }
    </script>

</body>
</html>
