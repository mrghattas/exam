        function ExamAnalyzer() {
          const [lang, setLang] = useState('ar');
          const t = (key) => translations[lang][key] || key;

          useEffect(() => {
              document.getElementById('html-root').dir = lang === 'ar' ? 'rtl' : 'ltr';
          }, [lang]);

          const [step, setStep] = useState(1);
          const [numQuestions, setNumQuestions] = useState(5);
          
          const [questionMaxScores, setQuestionMaxScores] = useState(Array(5).fill(10));
          
          const [thresholds, setThresholds] = useState({
            acceptable: 50,
            good: 65,
            veryGood: 75,
            excellent: 85
          });

          const [examInfo, setExamInfo] = useState({ subject: '', semester: '', school: '', stage: '' });
          const [studentsData, setStudentsData] = useState([]);
          const [fileName, setFileName] = useState('');
          const [customInsights, setCustomInsights] = useState({});
          
          const [savedProjects, setSavedProjects] = useState([]);
          const [showProjectsModal, setShowProjectsModal] = useState(false);

          const fileInputRef = useRef(null);
          const projectImportRef = useRef(null);

          useEffect(() => {
              const projects = JSON.parse(localStorage.getItem('examAnalyzerProjects') || '[]');
              setSavedProjects(projects);
          }, []);

          const changeNumQuestions = (value) => {
            const val = Number(value);
            if (val < 1) return;
            setNumQuestions(val);
            setQuestionMaxScores(prev => {
              const newScores = [...prev];
              if (val > prev.length) {
                for (let i = prev.length; i < val; i++) newScores.push(10);
              } else {
                newScores.splice(val);
              }
              return newScores;
            });
          };

          const handleScoreChange = (index, value) => {
            const newScores = [...questionMaxScores];
            newScores[index] = Number(value);
            setQuestionMaxScores(newScores);
          };

          const handleThresholdChange = (key, value) => {
            const val = Math.max(0, Math.min(100, Number(value)));
            setThresholds(prev => ({ ...prev, [key]: val }));
          };

          const validateExamInfo = () => {
            if (!examInfo.subject.trim() || !examInfo.semester.trim() || !examInfo.school.trim() || !examInfo.stage.trim()) {
              alert(t('alertMissingInfo'));
              return false;
            }
            return true;
          };

          const generateTemplate = () => {
            if (!validateExamInfo()) return;

            const headers = questionMaxScores.map((_, i) => `${t('question')} ${i + 1}`).join(";");
            const maxScoresRow = questionMaxScores.join(";");
            const dummyStudent1 = questionMaxScores.map(s => Math.max(0, s - 1)).join(";");
            const dummyStudent2 = questionMaxScores.map(s => Math.floor(s / 2)).join(";");
            
            const csvContent = "data:text/csv;charset=utf-8,\uFEFF" + headers + "\n" + maxScoresRow + "\n" + dummyStudent1 + "\n" + dummyStudent2;
            
            const encodedUri = encodeURI(csvContent);
            const link = document.createElement("a");
            link.setAttribute("href", encodedUri);
            link.setAttribute("download", `Template_${Date.now()}.csv`);
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            setStep(2);
          };

          const handleFileUpload = (e) => {
            const file = e.target.files[0];
            if (!file) return;
            setFileName(file.name);

            const reader = new FileReader();
            reader.onload = (event) => {
              const text = event.target.result;
              parseCSV(text);
            };
            reader.readAsText(file);
          };

          const parseCSV = (text) => {
            const lines = text.split(/\r?\n/).filter(line => line.trim() !== '');
            if (lines.length < 3) {
              alert(t('alertMissingData'));
              return;
            }

            const maxScoresCols = lines[1].split(/[,;\t]/).map(col => col.trim());
            const validQuestionIndices = [];
            const validMaxScores = [];

            for (let i = 0; i < maxScoresCols.length; i++) {
              const val = parseFloat(maxScoresCols[i]);
              if (!isNaN(val) && val > 0) {
                validQuestionIndices.push(i);
                validMaxScores.push(val);
              }
            }

            if (validMaxScores.length === 0) {
              alert(t('alertNoMaxScores'));
              return;
            }

            setNumQuestions(validMaxScores.length);
            setQuestionMaxScores(validMaxScores);

            const data = [];
            for (let i = 2; i < lines.length; i++) {
              const cols = lines[i].split(/[,;\t]/).map(col => col.trim());
              const studentScores = [];
              let studentTotal = 0;
              let hasValidData = false;

              for (let j = 0; j < validQuestionIndices.length; j++) {
                const colIndex = validQuestionIndices[j];
                let score = 0;
                if (colIndex < cols.length) {
                  const parsedScore = parseFloat(cols[colIndex]);
                  if (!isNaN(parsedScore)) {
                    score = parsedScore;
                    hasValidData = true;
                  }
                }
                studentScores.push(score);
                studentTotal += score;
              }

              if (hasValidData) {
                data.push({
                  name: `${t('student')} ${data.length + 1}`,
                  scores: studentScores,
                  total: studentTotal
                });
              }
            }

            if (data.length === 0) {
              alert(t('alertNoValidData'));
              return;
            }

            setStudentsData(data);
            setCustomInsights({}); 
            setStep(3);
          };
          
          const saveProjectLocally = () => {
              const defaultName = examInfo.subject ? `${examInfo.subject} - ${examInfo.stage}` : t('untitledProject');
              const projectName = window.prompt(t('projectNamePrompt'), defaultName);
              if (!projectName) return;

              const newProject = {
                  id: Date.now(),
                  name: projectName,
                  date: new Date().toLocaleDateString(lang === 'ar' ? 'ar-EG' : 'en-US'),
                  data: {
                      examInfo, numQuestions, questionMaxScores, thresholds, studentsData, customInsights, fileName
                  }
              };

              const updatedProjects = [newProject, ...savedProjects];
              localStorage.setItem('examAnalyzerProjects', JSON.stringify(updatedProjects));
              setSavedProjects(updatedProjects);
              alert(t('projectSaved'));
          };

          const loadProject = (project) => {
              const d = project.data;
              setExamInfo(d.examInfo);
              setNumQuestions(d.numQuestions);
              setQuestionMaxScores(d.questionMaxScores);
              setThresholds(d.thresholds);
              setStudentsData(d.studentsData);
              setCustomInsights(d.customInsights || {});
              setFileName(d.fileName || '');
              setShowProjectsModal(false);
              setStep(3);
          };

          const deleteProject = (id) => {
              if (window.confirm(lang === 'ar' ? 'هل أنت متأكد من حذف هذا المشروع؟' : 'Are you sure you want to delete this project?')) {
                  const updatedProjects = savedProjects.filter(p => p.id !== id);
                  localStorage.setItem('examAnalyzerProjects', JSON.stringify(updatedProjects));
                  setSavedProjects(updatedProjects);
              }
          };

          const exportProjectsBackup = () => {
              if (savedProjects.length === 0) return;
              const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(savedProjects));
              const link = document.createElement("a");
              link.setAttribute("href", dataStr);
              link.setAttribute("download", `ExamAnalyzer_Backup_${Date.now()}.json`);
              document.body.appendChild(link);
              link.click();
              link.remove();
          };

          const importProjectsBackup = (e) => {
              const file = e.target.files[0];
              if (!file) return;
              const reader = new FileReader();
              reader.onload = (event) => {
                  try {
                      const imported = JSON.parse(event.target.result);
                      if (Array.isArray(imported)) {
                          const currentIds = savedProjects.map(p => p.id);
                          const newProjects = imported.filter(p => !currentIds.includes(p.id));
                          const combined = [...newProjects, ...savedProjects];
                          
                          setSavedProjects(combined);
                          localStorage.setItem('examAnalyzerProjects', JSON.stringify(combined));
                          alert(t('importSuccess'));
                      } else {
                          throw new Error("Invalid format");
                      }
                  } catch (error) {
                      alert(t('importError'));
                  }

            if (studentsData.length === 0) return null;

            const maxTotalScore = questionMaxScores.reduce((a, b) => a + b, 0);
            const totals = studentsData.map(s => s.total);
            const totalStudents = studentsData.length;

            const sum = totals.reduce((a, b) => a + b, 0);
            const mean = sum / totalStudents;
            
            const sorted = [...totals].sort((a, b) => a - b);
            const median = totalStudents % 2 !== 0 
              ? sorted[Math.floor(totalStudents / 2)] 
              : (sorted[totalStudents / 2 - 1] + sorted[totalStudents / 2]) / 2;

            const freq = {};
            totals.forEach(t => freq[t] = (freq[t] || 0) + 1);
            let maxFreq = 0, mode = totals[0];
            for (const key in freq) {
              if (freq[key] > maxFreq) { maxFreq = freq[key]; mode = Number(key); }
            }

            const variance = totals.reduce((a, b) => a + Math.pow(b - mean, 2), 0) / totalStudents;
            const stdDev = Math.sqrt(variance);

            const maxScore = sorted[totalStudents - 1];
            const minScore = sorted[0];
            const range = maxScore - minScore;

            let gradesCount = { excellent: 0, veryGood: 0, good: 0, acceptable: 0, fail: 0 };
            
            totals.forEach(t => {
              const percentage = (t / maxTotalScore) * 100;
              if (percentage >= thresholds.excellent) gradesCount.excellent++;
              else if (percentage >= thresholds.veryGood) gradesCount.veryGood++;
              else if (percentage >= thresholds.good) gradesCount.good++;
              else if (percentage >= thresholds.acceptable) gradesCount.acceptable++;
              else gradesCount.fail++;
            });

            const passCount = totalStudents - gradesCount.fail;
            const passPercent = (passCount / totalStudents) * 100;

            const fullMarksCount = totals.filter(t => t === maxTotalScore).length;
            const zeroMarksCount = totals.filter(t => t === 0).length;
            const aboveMeanCount = totals.filter(t => t >= mean).length;

            const questionStats = [];
            for (let i = 0; i < numQuestions; i++) {
              const maxQScore = questionMaxScores[i];
              const qScores = studentsData.map(s => s.scores[i]);
              const qSum = qScores.reduce((a, b) => a + b, 0);
              const qMean = qSum / totalStudents;
              
              const qVariance = qScores.reduce((a, b) => a + Math.pow(b - qMean, 2), 0) / totalStudents;
              const qStdDev = Math.sqrt(qVariance);
              
              const difficulty = maxQScore > 0 ? (qMean / maxQScore) : 0; 
              const qFullMarks = qScores.filter(s => s === maxQScore).length;
              const qZeros = qScores.filter(s => s === 0).length;
              
              const qPassCount = qScores.filter(s => (s / maxQScore) * 100 >= thresholds.acceptable).length; 

              let insight = "";
              if (difficulty > 0.8) {
                insight = t('insightEasy');
              } else if (difficulty < 0.3) {
                insight = t('insightHard');
              } else {
                insight = t('insightMedium');
              }

              if (qZeros > totalStudents * 0.3) {
                insight += t('insightZeros');
              } else if (qFullMarks === totalStudents) {
                insight = t('insightFull');
              }

              const normalizedStdDev = maxQScore > 0 ? (qStdDev / maxQScore) : 0;
              if (normalizedStdDev > 0.3) {
                insight += t('insightHighStdDev');
              } else if (normalizedStdDev < 0.15) {
                insight += t('insightLowStdDev');
              } else {
                insight += t('insightNormalStdDev');
              }

              questionStats.push({
                id: i + 1,
                maxScore: maxQScore,
                mean: qMean,
                stdDev: qStdDev,
                normalizedStdDev: normalizedStdDev,
                difficulty: difficulty,
                fullMarks: qFullMarks,
                zeros: qZeros,
                passCount: qPassCount,
                passPercent: (qPassCount / totalStudents) * 100,
                fullMarksPercent: (qFullMarks / totalStudents) * 100,
                insight: insight
              });
            }

            return {
              totalStudents, maxTotalScore, mean, median, mode, stdDev, maxScore, minScore, range,
              gradesCount, passCount, passPercent, fullMarksCount, zeroMarksCount,
              aboveMeanCount, questionStats
            };
